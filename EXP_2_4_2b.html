<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt

import matplotlib
matplotlib.use("Agg")

plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
    'axes.labelsize': 12,
    'axes.titlesize': 14,
    'axes.linewidth': 1.2,
    'xtick.labelsize': 10,
    'ytick.labelsize': 10
})


# Solve the differential equation numerically using finite difference
def solve_diff_eq_finite_diff(u0, t0, tf, dt):
    """
    Solve u' = 9.8 - 1.2u using finite difference method.

    Parameters:
        u0 (float): Initial condition for u.
        t0 (float): Initial time.
        tf (float): Final time.
        dt (float): Time step.
    """
    
    # Time array
    t_values = np.arange(t0, tf + dt, dt)
    
    # Initialize u values array
    u_values = np.zeros_like(t_values)
    u_values[0] = u0

    # Solve using finite difference method
    print(f"Solving u' = 9.8 - 1.2u with finite difference method:\n")
    for i in range(1, len(t_values)):
        t_prev = t_values[i - 1]
        u_prev = u_values[i - 1]

        # Compute derivative using the equation
        du_dt = 9.8 - 1.2 * u_prev

        # Update u using finite difference method
        u_values[i] = u_prev + du_dt * dt

        # Display step-by-step results
        print(f"Step {i}: t = {t_prev:.2f}, u = {u_prev:.4f}, du/dt = {du_dt:.4f}, u_new = {u_values[i]:.4f}")

    # Return time and solution arrays
    return t_values, u_values

# Set parameters
u0 = 0.0        # Initial condition for u
t0 = 0.0        # Start time
tf = 10.0       # End time
dt = 0.1        # Time step

# Solve the differential equation
t, u = solve_diff_eq_finite_diff(u0, t0, tf, dt)

# Plot the solution
plt.figure(figsize=(8, 5))
plt.plot(t, u, label="u' = 9.8 - 1.2u")
plt.xlabel('Time (s)')
plt.ylabel('u(t)')
plt.title("Solution of the Differential Equation (Finite Difference Method)")
plt.legend()
plt.grid()


plt.tight_layout()
plt.savefig("plot.png")
plt.savefig("plot.pdf")
plt.savefig("plot.svg")

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) {
        numbers += i + "\n";
    }
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => {
    lineNumbers.scrollTop = code.scrollTop;
});

updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").src = "";

    await pyodide.loadPackage(["numpy","matplotlib"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);

        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

        let img = pyodide.FS.readFile("plot.png", {encoding:"binary"});
        let blob = new Blob([img], {type:"image/png"});
        document.getElementById("plot").src = URL.createObjectURL(blob);

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function downloadPlot(format) {
    try {
        let file = pyodide.FS.readFile("plot." + format, {encoding:"binary"});
        let blob = new Blob([file], {type:"application/octet-stream"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "plot." + format;
        link.click();
    } catch(err) {
        alert("Run the code first to generate the plot.");
    }
}
</script>
