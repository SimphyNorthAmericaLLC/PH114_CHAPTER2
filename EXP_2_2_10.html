<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_2_2_10.html</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: monospace;
    padding: 15px;
}

.editor {
    display: flex;
    border: 1px solid #444;
    height: 300px;
}

#lineNumbers {
    background: #111;
    color: #00ff00;
    padding: 10px 8px;
    margin: 0;
    text-align: right;
    user-select: none;
    overflow: hidden;
    white-space: pre;
    line-height: 1.4em;
}

#code {
    flex: 1;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
    resize: none;
    overflow: auto;
    white-space: pre;
    line-height: 1.4em;
    font-family: monospace;
}

button {
    margin-top: 10px;
    padding: 8px 14px;
    background: #007acc;
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    background: #111;
    padding: 10px;
    margin-top: 10px;
    min-height: 50px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h3>EXP_2_2_10.html</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np

# Given values
phi_L_deg = 66.6
phi_R_deg = 36.6
m = 1.97
g = 9.81

# Convert to radians
phi_L = np.radians(phi_L_deg)
phi_R = np.radians(phi_R_deg)

# Construct the system
A = np.array([
    [np.cos(phi_R), -np.cos(phi_L)],
    [np.sin(phi_R),  np.sin(phi_L)]
])
b = np.array([0, m * g])

# Solve
T_R, T_L = np.linalg.solve(A, b)

print(f"T_R = {T_R:.2f} N")
print(f"T_L = {T_L:.2f} N")
</textarea>
</div>

<button onclick="runCode()">Run</button>

<div id="output"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) {
        numbers += i + "\n";
    }
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => {
    lineNumbers.scrollTop = code.scrollTop;
});

updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";

    await pyodide.loadPackage(["numpy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);

        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}
</script>

</body>
</html>
