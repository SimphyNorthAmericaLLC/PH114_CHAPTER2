<textarea id="code" wrap="off">import math
import numpy as np
import matplotlib.pyplot as plt

import matplotlib
matplotlib.use("Agg")

plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
    'axes.labelsize': 12,
    'axes.titlesize': 14,
    'axes.linewidth': 1.2,
    'xtick.labelsize': 10,
    'ytick.labelsize': 10
})

from scipy.optimize import curve_fit

def time_to_slide(angle_degrees, length):
    # Convert angle from degrees to radians
    angle_radians = math.radians(angle_degrees)
    
    # Acceleration due to gravity
    g = 9.81  # m/s^2
    
    # Calculate acceleration along the incline
    acceleration = g * math.sin(angle_radians)
    
    # Calculate time to slide down the incline
    time = math.sqrt(2 * length / acceleration)
    
    return time

# List of angles in degrees
angles = [15, 25, 35, 45, 55, 65, 75, 85, 90]

# Length of the inclined plane
length = 2  # meters

# Calculate time for each angle
times = []
for angle in angles:
    time = time_to_slide(angle, length)
    times.append(time)

# Convert angles and times to numpy arrays
angles_np = np.array(angles)
times_np = np.array(times)

# Define the model function
def model_function(x, a):
    return np.sqrt(a / np.sin(np.radians(x)))

# Fit the model to the data
popt, pcov = curve_fit(model_function, angles_np, times_np)

# Get the optimized parameter
a_opt = popt[0]

# Display the optimized parameter
print("Optimized parameter (a):", a_opt)

# Generate values for the model curve
angles_fit = np.linspace(min(angles), max(angles), 100)
times_fit = model_function(angles_fit, a_opt)

# Plotting angle vs. time
plt.plot(angles_np, times_np, marker='o', label='Data')
plt.plot(angles_fit, times_fit, label='Model Fit: y = sqrt(a / sin(x))')
plt.title('Angle vs. Time to Slide')
plt.xlabel('Angle (degrees)')
plt.ylabel('Time (seconds)')
plt.legend()
plt.grid(True)


plt.tight_layout()
plt.savefig("plot.png")
plt.savefig("plot.pdf")
plt.savefig("plot.svg")
</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) {
        numbers += i + "\n";
    }
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => {
    lineNumbers.scrollTop = code.scrollTop;
});

updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").src = "";

    await pyodide.loadPackage(["numpy","matplotlib","scipy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);

        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

        let img = pyodide.FS.readFile("plot.png", {encoding:"binary"});
        let blob = new Blob([img], {type:"image/png"});
        document.getElementById("plot").src = URL.createObjectURL(blob);

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function downloadPlot(format) {
    try {
        let file = pyodide.FS.readFile("plot." + format, {encoding:"binary"});
        let blob = new Blob([file], {type:"application/octet-stream"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "plot." + format;
        link.click();
    } catch(err) {
        alert("Run the code first to generate the plot.");
    }
}
</script>
