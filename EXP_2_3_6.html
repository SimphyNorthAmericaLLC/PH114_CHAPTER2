<body>

<h3>EXP_2_3_6.html</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import sympy as sp
import numpy as np
import matplotlib.pyplot as plt

import matplotlib
matplotlib.use("Agg")

plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
    'axes.labelsize': 12,
    'axes.titlesize': 14,
    'axes.linewidth': 1.2,
    'xtick.labelsize': 10,
    'ytick.labelsize': 10
})


# Step 1: Calculate Acceleration
t = sp.symbols('t')
m = 1  # mass in kg
force = 2 + 0.7 * t - 0.1* m * 9.8
acceleration = force / m

# Step 2: Integrate to Find Velocity
velocity = sp.integrate(acceleration, t)

# Step 3: Integrate to Find Distance
distance = sp.integrate(velocity, t)

# Step 4: Evaluate for t = 4
t_value = 4
velocity_at_t = velocity.subs(t, t_value)
distance_at_t = distance.subs(t, t_value)

# Step 5: Create Symbolic Expressions and Plot
sp.init_printing(use_unicode=True)

# Symbolic expressions
print("Acceleration (a):")
sp.pprint(acceleration)

print("\nVelocity (v):")
sp.pprint(velocity)

print("\nDistance (s):")
sp.pprint(distance)

# Plotting
t_vals = np.linspace(0, 5, 100)
v_vals = [velocity.subs(t, val) for val in t_vals]
s_vals = [distance.subs(t, val) for val in t_vals]

plt.figure(figsize=(12, 6))

# Plot Velocity
plt.subplot(1, 2, 1)
plt.plot(t_vals, v_vals, label='Velocity')
plt.title('Velocity vs. Time')
plt.xlabel('Time (s)')
plt.ylabel('Velocity (m/s)')
plt.legend()

# Plot Distance
plt.subplot(1, 2, 2)
plt.plot(t_vals, s_vals, label='Distance')
plt.title('Distance vs. Time')
plt.xlabel('Time (s)')
plt.ylabel('Distance (m)')
plt.legend()

plt.tight_layout()


# Step 4: Results at t = 4
print("\nResults at t = 4 seconds:")
print("Velocity:", velocity_at_t, "m/s")
print("Distance:", distance_at_t, "m")

plt.tight_layout()
plt.savefig("plot.png")
plt.savefig("plot.pdf")
plt.savefig("plot.svg")
</textarea>
</div>

<button onclick="runCode()">Run</button>
<button onclick="downloadPlot('png')">Download PNG</button>
<button onclick="downloadPlot('pdf')">Download PDF</button>
<button onclick="downloadPlot('svg')">Download SVG</button>

<div id="output"></div>
<img id="plot"/>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) {
        numbers += i + "\n";
    }
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => {
    lineNumbers.scrollTop = code.scrollTop;
});

updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").src = "";

    await pyodide.loadPackage(["numpy","matplotlib","sympy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);

        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

        let img = pyodide.FS.readFile("plot.png", {encoding:"binary"});
        let blob = new Blob([img], {type:"image/png"});
        document.getElementById("plot").src = URL.createObjectURL(blob);

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function downloadPlot(format) {
    try {
        let file = pyodide.FS.readFile("plot." + format, {encoding:"binary"});
        let blob = new Blob([file], {type:"application/octet-stream"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "plot." + format;
        link.click();
    } catch(err) {
        alert("Run the code first to generate the plot.");
    }
}
</script>

</body>
</html>
