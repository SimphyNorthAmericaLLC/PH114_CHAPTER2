<h3>EXP_2_2_7.html</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import sympy as sp
import matplotlib.pyplot as plt

import matplotlib
matplotlib.use("Agg")

plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
    'axes.labelsize': 12,
    'axes.titlesize': 14,
    'axes.linewidth': 1.2,
    'xtick.labelsize': 10,
    'ytick.labelsize': 10
})

import numpy as np

# Symbolic variables
t = sp.symbols('t')

# Given parameters
mass = 0.5  # mass of the object in kg
gravity = 9.8  # acceleration due to gravity in m/s^2

# Define symbolic expressions for the applied force, gravity force, net force, and acceleration
applied_force = 3 * t**1.2
gravity_force = mass * gravity
net_force = applied_force - gravity_force
acceleration = net_force / mass

# Integrate the acceleration to get the symbolic expression for velocity
velocity_expr = sp.integrate(acceleration, t)

# Convert the symbolic expression to a function for numerical evaluation
velocity_func = sp.lambdify(t, velocity_expr, 'numpy')

# Time values for the plot
time_values = np.linspace(0, 10, 100)

# Evaluate the velocity function for the time values
speed_values = velocity_func(time_values)

# Calculate the speed after 3 seconds
speed_after_3_seconds = velocity_func(3)

# Print the symbolic expression for velocity and the speed after 3 seconds
print("Symbolic expression for velocity:")
print(velocity_expr)
print("\nThe speed of the mass after 3 seconds is approximately {:.2f} m/s.".format(speed_after_3_seconds))

# Plot speed vs. time
plt.figure(figsize=(12, 6))

plt.subplot(1, 2, 1)
plt.plot(time_values, speed_values, label='Speed vs. Time')
plt.title('Speed vs. Time')
plt.xlabel('Time (seconds)')
plt.ylabel('Speed (m/s)')
plt.legend()
plt.grid(True)

plt.subplot(1, 2, 2)
# Plot applied force vs. time
applied_force_values = [applied_force.subs(t, val) for val in time_values]
plt.plot(time_values, applied_force_values, label='Applied Force vs. Time', color='orange')
plt.title('Applied Force vs. Time')
plt.xlabel('Time (seconds)')
plt.ylabel('Force (N)')
plt.legend()
plt.grid(True)

plt.tight_layout()


plt.tight_layout()
plt.savefig("plot.png")
plt.savefig("plot.pdf")
plt.savefig("plot.svg")
</textarea>

<button onclick="runCode()">Run</button>
<button onclick="downloadPlot('png')">Download PNG</button>
<button onclick="downloadPlot('pdf')">Download PDF</button>
<button onclick="downloadPlot('svg')">Download SVG</button>

<div id="output"></div>
<img id="plot"/>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) {
        numbers += i + "\n";
    }
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => {
    lineNumbers.scrollTop = code.scrollTop;
});

updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").src = "";

    await pyodide.loadPackage(["numpy","matplotlib","sympy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);

        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

        let img = pyodide.FS.readFile("plot.png", {encoding:"binary"});
        let blob = new Blob([img], {type:"image/png"});
        document.getElementById("plot").src = URL.createObjectURL(blob);

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function downloadPlot(format) {
    try {
        let file = pyodide.FS.readFile("plot." + format, {encoding:"binary"});
        let blob = new Blob([file], {type:"application/octet-stream"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "plot." + format;
        link.click();
    } catch(err) {
        alert("Run the code first to generate the plot.");
    }
}
</script>
